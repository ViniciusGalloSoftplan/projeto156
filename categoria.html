<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Categoria de Serviços – Prefeitura Municipal de Piracicaba</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/iconify-icon@2/dist/iconify-icon.min.js"></script>
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">
    <img src="https://sempapel.pmp.sp.gov.br/Imagens/logoPmp.webp" alt="Logo Prefeitura de Piracicaba" class="logo-img">
    <div>
      <div class="logo-text">Portal de Serviços</div>
      <div class="logo-sub">Prefeitura Municipal de Piracicaba</div>
    </div>
  </div>
  <div class="header-actions">
    <span class="badge">📞 156</span>
  </div>
</header>

<div class="layout">
  <!-- BREADCRUMB -->
  <div class="breadcrumb">
    <div class="breadcrumb-content" id="breadcrumb">
      <button class="breadcrumb-back-btn" onclick="goBack()">
        <iconify-icon icon="ph:arrow-left"></iconify-icon>
        <span>Voltar para categorias</span>
      </button>
      <span class="breadcrumb-separator">|</span>
      <span class="breadcrumb-item" data-level="home" onclick="goBack()">Início</span>
      <span class="breadcrumb-separator">></span>
      <span class="breadcrumb-item" data-level="categories" onclick="goBack()">Categorias de Serviços</span>
      <span class="breadcrumb-separator">></span>
      <span class="breadcrumb-item active" id="breadcrumbCategory">Categoria</span>
    </div>
  </div>

  <!-- MAIN -->
  <main id="main"></main>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-content">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">Formulário</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <iframe class="modal-iframe" id="modalIframe" src=""></iframe>
    </div>
  </div>
</div>

<div class="footer-strip">
  <span>© 2024 Prefeitura Municipal de Piracicaba — SIP 156</span>
  <span>Todos os serviços disponíveis 24h</span>
</div>

<script src="assets/js/data.js"></script>
<script src="assets/js/categoria.js"></script>
</body>

</html>
